<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Luca's Trainer Journey</title>
<link rel="icon" href="assets/pokemon/pokeball.png">
<link rel="stylesheet" href="app/styles.css">
<style>
  html,body{margin:0;height:100%;display:flex;align-items:center;justify-content:center;text-align:center}
  .wrap{padding:32px;max-width:420px}
  h1{font-family:var(--font-display);font-weight:900;font-style:italic;font-size:2rem;color:#fff;margin:0 0 8px;text-shadow:0 2px 12px rgba(0,0,0,.3)}
  p{font-family:var(--font-body);color:rgba(255,255,255,.85);margin:0 0 28px}
  .links{display:flex;flex-direction:column;gap:14px}
  a.btn{display:block;padding:16px 24px;border-radius:999px;text-decoration:none;font-family:var(--font-display);font-weight:800;font-style:italic;font-size:1.1rem}
  a.primary{background-image:var(--gloss-banana);color:#5a4410;box-shadow:var(--glow-banana)}
  a.secondary{background:#fff;color:var(--mewtwo-x);box-shadow:var(--shadow-card)}
</style>
</head>
<body style="background:var(--field-hero)">
<div class="wrap">
  <h1>Luca's Trainer Journey</h1>
  <p>Pick where you're headed, Trainer.</p>
  <div class="links">
    <a class="btn primary" href="app/">Play the scavenger hunt →</a>
    <a class="btn secondary" href="invite/">Make an invitation →</a>
  </div>
</div>
</body>
</html>
